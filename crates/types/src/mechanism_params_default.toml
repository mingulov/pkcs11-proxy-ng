# Default mechanism parameter shape mappings for the PKCS#11 proxy.
#
# This file is embedded at compile time via include_str!() and defines the
# baseline set of mechanisms the proxy understands. Operators can layer an
# override TOML on top to add vendor-specific mechanisms.
#
# Hex values are taken from OASIS PKCS#11 v3.02 pkcs11t.h.

# Discovery mode: "transparent" passes all backend mechanisms through to
# clients; "filtered" only advertises mechanisms the proxy can fully handle.
discovery_mode = "transparent"

# ─── Parameterless mechanisms ───────────────────────────────────────────────
#
# Mechanisms that always take NULL pMechanism->pParameter.
# The proxy forwards these without inspecting parameters.

parameterless = [
    # RSA
    0x0000,  # CKM_RSA_PKCS_KEY_PAIR_GEN
    0x0001,  # CKM_RSA_PKCS
    0x0002,  # CKM_RSA_9796
    0x0003,  # CKM_RSA_X_509
    0x0004,  # CKM_MD2_RSA_PKCS
    0x0005,  # CKM_MD5_RSA_PKCS
