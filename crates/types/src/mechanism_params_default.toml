# ─── Parameterized mechanism shapes ─────────────────────────────────────────
#
# Each [[params]] entry maps a named parameter shape to one or more mechanism
# types that use that shape. The proxy uses the shape name to select the
# correct serialization/deserialization logic.

# RSA-PSS: CK_RSA_PKCS_PSS_PARAMS (hash_alg, mgf, salt_len)
[[params]]
shape = "rsa_pss"
mechanisms = [
    0x000D,  # CKM_RSA_PKCS_PSS
    0x000E,  # CKM_SHA1_RSA_PKCS_PSS
    0x0043,  # CKM_SHA256_RSA_PKCS_PSS
    0x0044,  # CKM_SHA384_RSA_PKCS_PSS
    0x0045,  # CKM_SHA512_RSA_PKCS_PSS
    0x0047,  # CKM_SHA224_RSA_PKCS_PSS
    0x0063,  # CKM_SHA3_256_RSA_PKCS_PSS
    0x0064,  # CKM_SHA3_384_RSA_PKCS_PSS
    0x0065,  # CKM_SHA3_512_RSA_PKCS_PSS
    0x0067,  # CKM_SHA3_224_RSA_PKCS_PSS
]

# RSA-OAEP: CK_RSA_PKCS_OAEP_PARAMS (hash_alg, mgf, source, source_data)
[[params]]
