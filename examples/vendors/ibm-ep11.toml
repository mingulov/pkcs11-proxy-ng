# IBM EP11 (Enterprise PKCS#11) vendor mechanism extensions.
# Use with: PKCS11_PROXY_MECHANISMS=/path/to/ibm-ep11.toml
#
# Reference: ep11.h (https://github.com/IBM-Cloud/hpcs-grep11/blob/master/ep11.h)
# Vendor base: CKM_VENDOR_DEFINED + 0x10000 range

# --- SHA-3 family (parameterless) ---
parameterless = [
  0x80010001, # CKM_IBM_SHA3_224
  0x80010002, # CKM_IBM_SHA3_256
  0x80010003, # CKM_IBM_SHA3_384
  0x80010004, # CKM_IBM_SHA3_512
  0x80010005, # CKM_IBM_SHA3_224_HMAC
  0x80010006, # CKM_IBM_SHA3_256_HMAC
  0x80010007, # CKM_IBM_SHA3_384_HMAC
  0x80010008, # CKM_IBM_SHA3_512_HMAC
]

# --- EdDSA (parameterless) ---
parameterless = [
  0x80010020, # CKM_IBM_ED25519_SHA512
  0x80010021, # CKM_IBM_ED448_SHA3
]

# --- AES-CMAC ---
[[params]]
shape = "mac_general"
mechanisms = [0x80010009]  # CKM_IBM_CMAC

# --- Post-quantum cryptography ---
[[params]]
shape = "dilithium"
mechanisms = [0x80010023]  # CKM_IBM_DILITHIUM

[[params]]
shape = "kyber"
mechanisms = [0x80010024]  # CKM_IBM_KYBER

# --- Blockchain key derivation ---
[[params]]
shape = "hd_key_derive"
mechanisms = [0x80070001, 0x80070002]  # CKM_IBM_BTC_DERIVE, CKM_IBM_ETH_DERIVE

# --- Schnorr signatures (parameterless) ---
parameterless = [
  0x80010025, # CKM_IBM_ECDSA_OTHER (Schnorr)
]
