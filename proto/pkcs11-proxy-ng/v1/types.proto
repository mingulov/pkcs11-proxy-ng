// --- Exact byte-output RPC (Track B) ---

message ByteOutputExactRequest {
  string client_context_id = 1;
  uint64 session_handle = 2;
  ByteOutputFunction function = 3;
  OutputBufferSpec output_spec = 4;
  bytes input_data = 5;                  // data/part for functions that take input
  optional Mechanism mechanism = 6;      // only for wrap_key
  uint64 wrapping_key_handle = 7;        // only for wrap_key
  uint64 key_handle = 8;                 // only for wrap_key
}
message ByteOutputExactResponse {
  OutputBufferResult result = 1;
  Mechanism mechanism_out = 2;
}

// --- Exact parameter-output RPC (Track C) ---

// Discriminator for the 7 parameter-output PKCS#11 functions that share
// the ParameterOutputExact RPC.
enum ParameterOutputFunction {
  PARAMETER_OUTPUT_FUNCTION_UNSPECIFIED = 0;
  PARAMETER_OUTPUT_FUNCTION_ENCRYPT_MESSAGE = 1;
  PARAMETER_OUTPUT_FUNCTION_DECRYPT_MESSAGE = 2;
  PARAMETER_OUTPUT_FUNCTION_SIGN_MESSAGE = 3;
  PARAMETER_OUTPUT_FUNCTION_ENCRYPT_MESSAGE_NEXT = 4;
  PARAMETER_OUTPUT_FUNCTION_DECRYPT_MESSAGE_NEXT = 5;
  PARAMETER_OUTPUT_FUNCTION_SIGN_MESSAGE_NEXT = 6;
  PARAMETER_OUTPUT_FUNCTION_WRAP_KEY_AUTHENTICATED = 7;
}

message ParameterOutputExactRequest {
  string client_context_id = 1;
  uint64 session_handle = 2;
  ParameterOutputFunction function = 3;
  OutputBufferSpec output_spec = 4;
  bytes input_data = 5;                          // plaintext/ciphertext/data
  bytes associated_data = 6;                     // AAD for message encrypt/decrypt and auth wrap
  bytes parameter = 7;                           // input parameter (IV/nonce)
  ParameterRoundtripSpec parameter_out_spec = 8; // spec for parameter write-back buffer
  uint64 flags = 9;                              // for *_next functions
  optional Mechanism mechanism = 10;             // only for wrap_key_authenticated
  uint64 wrapping_key_handle = 11;               // only for wrap_key_authenticated
  uint64 key_handle = 12;                        // only for wrap_key_authenticated
  optional MessageParameter message_parameter = 13; // structured message param (replaces raw `parameter` for message crypto)
}

message ParameterOutputExactResponse {
  OutputBufferResult output_result = 1;
  ParameterRoundtripResult parameter_result = 2;
  optional MessageParameter message_parameter_out = 3; // modified message param after backend call
}

// Track C Task 2: C_EncapsulateKey with exact output semantics
message EncapsulateKeyExactRequest {
  string client_context_id = 1;
  uint64 session_handle = 2;
  Mechanism mechanism = 3;
  uint64 public_key_handle = 4;
  repeated Attribute template = 5;
  OutputBufferSpec output_spec = 6;
}

message EncapsulateKeyExactResponse {
  OutputAndHandleResult result = 1;
}

// BUG-001: Interface version transparency

message GetBackendInterfacesRequest {}

message InterfaceInfo {
  uint32 version_major = 1;
  uint32 version_minor = 2;
  // Function names that are NULL in the backend's function list.
  repeated string null_functions = 3;
}

message GetBackendInterfacesResponse {
  repeated InterfaceInfo interfaces = 1;
}
